<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Welcome</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #0a0e27, #1a1f3a);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #ff6b35, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .buttons {
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 10px 30px rgba(255, 107, 53, 0.3);
        }
        .btn1 {
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            color: white;
        }
        .btn2 {
            background: linear-gradient(135deg, #f7931e, #ffd700);
            color: white;
        }
        .btn:hover {
            transform: translateY(-3px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome</h1>
        <p style="font-size: 1.2rem; color: #ffd700; margin-bottom: 3rem;">Choose a project</p>
        <div class="buttons">
            <a href="tahwisa-app/tahwisa-journey/index.html" class="btn btn1">Friend's Project</a>
            <a href="tahwisa/index.html" class="btn btn2">Your TAHWISA</a>
        </div>
    </div>
</body>
</html>
