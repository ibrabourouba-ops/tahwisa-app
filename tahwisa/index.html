<!DOCTYPE html>
<html>
<head>
    <title>Create Account - TAHWISA</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #0a0e27, #1a1f3a);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: rgba(255,255,255,0.1);
            padding: 2rem;
            border-radius: 10px;
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #ffd700;
        }
        .btn {
            padding: 1rem 2rem;
            background: #ff6b35;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 1rem;
        }
        .btn:hover {
            background: #f7931e;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to TAHWISA</h1>
        <p>Create Your Account Here</p>
        <form>
            <input type="text" placeholder="Full Name" required style="padding: 0.5rem; width: 100%; margin: 0.5rem 0; border: none; border-radius: 5px;">
            <input type="email" placeholder="Email" required style="padding: 0.5rem; width: 100%; margin: 0.5rem 0; border: none; border-radius: 5px;">
            <input type="password" placeholder="Password" required style="padding: 0.5rem; width: 100%; margin: 0.5rem 0; border: none; border-radius: 5px;">
            <button class="btn" type="submit">Create Account</button>
        </form>
        <p><a href="../index.html" style="color: #ffd700;">← Back to Travel</a></p>
    </div>
</body>
</html>
